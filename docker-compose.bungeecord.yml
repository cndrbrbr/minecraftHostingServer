services:

  # ── BungeeCord proxy ────────────────────────────────────────
  # Single public entry point for all Minecraft clients.
  # Handles Mojang auth centrally and routes players to servers.
  bungee:
    build: ./bungee
    container_name: bungee
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"   # only public Minecraft port
    environment:
      BUNGEE_MEM_MAX: "512M"
    volumes:
      - bungee_data:/bungee
    networks:
      - workshop

  # ── Lobby server ────────────────────────────────────────────
  # Players land here first. No host MC port — only reachable
  # via BungeeCord. No SSH access needed (admin-managed only).
  lobby:
    build: ./spigot
    container_name: lobby
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "9940:9940"     # Prometheus exporter — lobby
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "30"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: ""
      CTRL_PUBKEY: ""
    volumes:
      - lobby_data:/server
    networks:
      - workshop

  # ── Student servers ─────────────────────────────────────────
  # No host MC port — only reachable via BungeeCord.
  # SSH ports remain open for FileZilla and PuTTY access.

  mc1:
    build: ./spigot
    container_name: mc1
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "2221:22"       # SSH (FileZilla + PuTTY) — student 1
      - "9941:9940"     # Prometheus exporter — student 1
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "5"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: "${MC1_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC1_CTRL_PUBKEY}"
    volumes:
      - mc1_data:/server
    networks:
      - workshop

  mc2:
    build: ./spigot
    container_name: mc2
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "2222:22"       # SSH — student 2
      - "9942:9940"     # Prometheus exporter — student 2
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "5"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: "${MC2_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC2_CTRL_PUBKEY}"
    volumes:
      - mc2_data:/server
    networks:
      - workshop

  mc3:
    build: ./spigot
    container_name: mc3
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "2223:22"       # SSH — student 3
      - "9943:9940"     # Prometheus exporter — student 3
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "5"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: "${MC3_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC3_CTRL_PUBKEY}"
    volumes:
      - mc3_data:/server
    networks:
      - workshop

  mc4:
    build: ./spigot
    container_name: mc4
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "2224:22"       # SSH — student 4
      - "9944:9940"     # Prometheus exporter — student 4
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "5"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: "${MC4_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC4_CTRL_PUBKEY}"
    volumes:
      - mc4_data:/server
    networks:
      - workshop

  mc5:
    build: ./spigot
    container_name: mc5
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "2225:22"       # SSH — student 5
      - "9945:9940"     # Prometheus exporter — student 5
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "5"
      MC_PORT: "25565"
      MC_BUNGEECORD: "true"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      SFTP_PUBKEY: "${MC5_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC5_CTRL_PUBKEY}"
    volumes:
      - mc5_data:/server
    networks:
      - workshop

volumes:
  bungee_data:
  lobby_data:
  mc1_data:
  mc2_data:
  mc3_data:
  mc4_data:
  mc5_data:

networks:
  workshop:
    driver: bridge
