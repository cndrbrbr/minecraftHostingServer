# backup-server/docker-compose.yml
#
# Serves the backup zip files over HTTP so mc-restore.sh can fetch them.
#
# Run this on the host that holds the backups (usually the same machine
# as the Minecraft containers, or a dedicated backup host).
#
# Usage:
#   docker compose up -d
#
# The backups directory is expected one level up at ../backups/.
# Adjust the volume path below if your backups live elsewhere.
#
# Set BACKUP_URL=http://<this-host>:8080 in the Minecraft docker-compose.yml
# so the restore command knows where to fetch from.
#
# Does this need TLS?
#   No — for a LAN / workshop setup HTTP on port 8080 is fine.
#   If the backup server must be reachable over the public internet, put a
#   TLS reverse proxy (e.g. Caddy with automatic Let's Encrypt) in front of
#   it and point BACKUP_URL at the HTTPS address instead.

services:
  backup-server:
    image: nginx:alpine
    container_name: mc-backup-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../backups:/usr/share/nginx/html:ro
    # Optional: show directory listings so you can browse backups in a browser
    # Remove or comment out the command below to disable directory listing.
    command: >
      sh -c "
        printf 'server {\n
          listen 80;\n
          root /usr/share/nginx/html;\n
          location / {\n
            autoindex on;\n
            autoindex_exact_size off;\n
            autoindex_localtime on;\n
          }\n
        }\n' > /etc/nginx/conf.d/default.conf
        && nginx -g 'daemon off;'
      "
