services:

  # ── Student servers — standalone mode ───────────────────────
  # Each server is directly reachable by Minecraft clients.
  # No BungeeCord proxy, no lobby.

  mc1:
    build: ./spigot
    container_name: mc1
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"   # Minecraft — student 1
      - "2221:22"       # SSH (FileZilla + PuTTY) — student 1
    environment:
      MC_NAME: mc1
      MC_LEVELNAME: world
      MC_PORT: "25565"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "1G"
      FORCE_BUILD: "false"
      BACKUP_URL: ""
      SFTP_PUBKEY: "${MC1_SFTP_PUBKEY}"
      CTRL_PUBKEY: "${MC1_CTRL_PUBKEY}"
    volumes:
      - mc1_data:/server

